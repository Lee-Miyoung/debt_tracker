<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부채 탕감 프로젝트 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col justify-between pb-12">

    <div class="w-full max-w-2xl mx-auto px-4 pt-6 md:pt-10 flex-grow">
        <div class="bg-gradient-to-r from-slate-900 to-indigo-950 text-white rounded-3xl p-6 md:p-8 shadow-xl relative overflow-hidden mb-6">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-500 rounded-full opacity-10 blur-xl"></div>
            <div class="absolute -left-10 -bottom-10 w-40 h-40 bg-emerald-500 rounded-full opacity-10 blur-xl"></div>
            
            <div class="flex justify-between items-start">
                <div>
                    <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 backdrop-blur-xs mb-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                        연 3% 독립 정산 및 5년 만기 목표 플랫폼
                    </span>
                    <h1 class="text-2xl md:text-3xl font-black tracking-tight text-white">부채 탕감 프로젝트</h1>
                    <p class="text-slate-400 text-xs md:text-sm mt-1 font-light">청인마루 현장 데이터 기록 및 실시간 관리 대시보드</p>
                    
                    <div class="flex items-center gap-1 text-[11px] text-slate-300 mt-3 bg-white/10 border border-white/15 rounded-lg px-2 py-1 w-fit">
                        <span>📅 차용 시작일 :</span>
                        <input type="date" id="startDateInput" onchange="changeStartDate(this.value)" class="bg-transparent text-white focus:outline-none font-bold text-[11px] cursor-pointer">
                    </div>
                </div>
                <div id="storageBadge" class="text-xs px-2.5 py-1 rounded-md font-bold bg-amber-500/20 text-amber-300 border border-amber-500/30">
                    연결 중...
                </div>
            </div>

            <div class="mt-6 bg-white/5 backdrop-blur-md rounded-2xl p-6 border border-white/10">
                <div class="grid grid-cols-2 gap-4 divide-x divide-white/10">
                    <div class="text-center pr-2">
                        <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider">남은 원금 총액</p>
                        <h2 id="principalDisplay" class="text-2xl md:text-3xl font-black text-white mt-1 tracking-tight">로딩 중...</h2>
                    </div>
                    <div class="text-center pl-4">
                        <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider">남은 이자 총액 (연 3%)</p>
                        <h2 id="interestDisplay" class="text-2xl md:text-3xl font-black text-amber-400 mt-1 tracking-tight">로딩 중...</h2>
                    </div>
                </div>
                
                <div class="mt-5 text-xs font-medium text-slate-300 bg-black/20 border border-white/5 rounded-xl py-2.5 px-3 flex justify-between items-center">
                    <span>🎯 5년 만기 전액 상환 목표 기한: <b class="text-white">2031년 5월 1일</b></span>
                    <span id="dDayBadge" class="bg-indigo-600 text-white font-black px-2 py-0.5 rounded-md text-[11px] shadow-xs">D-Day</span>
                </div>
                
                <div class="mt-4">
                    <div class="flex justify-between text-xs font-semibold text-slate-400 mb-1.5">
                        <span id="progressPercent">순수 원금 상환율: 0%</span>
                        <span id="totalClearedDisplay">총 원금 탕감액: 0원</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden p-0.5 border border-slate-700">
                        <div id="progressBar" class="bg-gradient-to-r from-indigo-500 to-emerald-400 h-full rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            
            <div class="bg-white rounded-3xl p-6 shadow-xs border border-slate-100">
                <div class="flex items-center gap-2 mb-4">
                    <div class="p-2 rounded-xl bg-indigo-50 text-indigo-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-slate-900">새로운 내역 등록 (탕감 / 부채 추가)</h3>
                        <p class="text-[11px] text-indigo-600 font-medium">💡 탕감 항목 선택 박스를 [더블클릭]하면 목록에 없는 항목을 직접 입력할 수 있습니다!</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">항목 분류</label>
                        <select id="category" onchange="toggleButtonText(this.value)" ondblclick="addCustomCategoryDirectly()" title="더블클릭하여 맞춤 항목 직접 입력" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-medium">
                            <option value="알바">알바비 정산</option>
                            <option value="용돈 차감">이번 달 용돈 차감</option>
                            <option value="특별 탕감">특별 상환 / 격려 상환</option>
                            <option value="현장사진">현장사진</option>
                            <option value="배송">배송</option>
                            <option value="자재상하차">자재상하차</option>
                            <option value="기타">기타</option>
                            <option value="부채 추가 (증액)" class="text-emerald-600 font-bold">➕ 부채 추가 (증액)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">날짜 선택</label>
                        <input type="date" id="dateInput" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-medium text-slate-900">
                    </div>
                    <div>
                        <label id="amountLabel" class="block text-xs font-semibold text-slate-500 mb-1">탕감 금액 (원)</label>
                        <input type="number" id="amount" placeholder="예: 350000" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-bold text-slate-900">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-xs font-semibold text-slate-500 mb-1">상세 내용 및 메모</label>
                        <input type="text" id="description" placeholder="예: [청인마루 송도점] 거실 마루 시공 지원 알바비 정산" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-xs font-semibold text-slate-500 mb-1">청인마루 현장 사진 및 관련 영수증 등록</label>
                        <input type="file" id="imageInput" accept="image/*" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-all">
                    </div>
                </div>

                <button onclick="addDeduction()" id="submitBtn" class="w-full mt-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md shadow-indigo-600/10 transition duration-200 active:scale-[0.99] cursor-pointer flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w
