<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부채 탕감 프로젝트 Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col justify-between pb-12">

    <div class="w-full max-w-2xl mx-auto px-4 pt-6 md:pt-10 flex-grow">
        <!-- 상단 헤더 카드 -->
        <div class="bg-gradient-to-r from-slate-900 to-indigo-950 text-white rounded-3xl p-6 md:p-8 shadow-xl relative overflow-hidden mb-6">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-indigo-500 rounded-full opacity-10 blur-xl"></div>
            <div class="absolute -left-10 -bottom-10 w-40 h-40 bg-emerald-500 rounded-full opacity-10 blur-xl"></div>
            
            <div class="flex justify-between items-start">
                <div>
                    <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 backdrop-blur-xs mb-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                        실시간 공유 플랫폼
                    </span>
                    <h1 class="text-2xl md:text-3xl font-black tracking-tight text-white">부채 탕감 프로젝트</h1>
                    <p class="text-slate-400 text-xs md:text-sm mt-1 font-light">부모와 아들이 신뢰로 함께 기록하는 투명한 정산판</p>
                </div>
                <div id="storageBadge" class="text-xs px-2.5 py-1 rounded-md font-bold bg-amber-500/20 text-amber-300 border border-amber-500/30">
                    로컬 모드
                </div>
            </div>

            <!-- 대시보드 메인 잔액 -->
            <div class="mt-8 text-center bg-white/5 backdrop-blur-md rounded-2xl p-5 border border-white/10">
                <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">남은 부채 총액</p>
                <h2 id="balanceDisplay" class="text-3xl md:text-4xl font-black text-white mt-1 tracking-tight">50,000,000원</h2>
                
                <!-- 진행률 바 -->
                <div class="mt-5">
                    <div class="flex justify-between text-xs font-semibold text-slate-400 mb-1.5">
                        <span id="progressPercent">상환율: 0%</span>
                        <span id="totalClearedDisplay">총 탕감액: 0원</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden p-0.5 border border-slate-700">
                        <div id="progressBar" class="bg-gradient-to-r from-indigo-500 to-emerald-400 h-full rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 메인 컨텐츠 2분할 (PC에서는 위아래 배치하되 모바일 가독성 최적화) -->
        <div class="space-y-6">
            
            <!-- 1. 탕감 등록 카드 -->
            <div class="bg-white rounded-3xl p-6 shadow-xs border border-slate-100">
                <div class="flex items-center gap-2 mb-4">
                    <div class="p-2 rounded-xl bg-indigo-50 text-indigo-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <h3 class="text-lg font-bold text-slate-900">새로운 탕감 내역 등록</h3>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">탕감 항목 (분류)</label>
                        <select id="category" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-medium">
                            <option value="알바">알바비 정산</option>
                            <option value="용돈 차감">이번 달 용돈 차감</option>
                            <option value="특별 탕감">특별 상환 / 격려 상환</option>
                            <option value="기타">기타</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">탕감 금액 (원)</label>
                        <input type="number" id="amount" placeholder="예: 350000" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all font-bold text-slate-900">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-slate-500 mb-1">상세 내용 및 메모</label>
                        <input type="text" id="description" placeholder="예: 주말 카페 아르바이트 주급 정산분" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                    </div>
                </div>

                <button onclick="addDeduction()" class="w-full mt-5 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md shadow-indigo-600/10 transition duration-200 active:scale-[0.99] cursor-pointer flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    탕감 내역 반영하기
                </button>
            </div>

            <!-- 2. 히스토리 리스트 카드 -->
            <div class="bg-white rounded-3xl p-6 shadow-xs border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-2">
                        <div class="p-2 rounded-xl bg-slate-100 text-slate-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                            </svg>
                        </div>
                        <h3 class="text-lg font-bold text-slate-900">탕감 히스토리 내역</h3>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportToCSV()" class="text-xs font-semibold bg-emerald-50 hover:bg-emerald-100 text-emerald-600 border border-emerald-200 rounded-lg px-3 py-1.5 transition cursor-pointer">
                            엑셀 다운로드
                        </button>
                        <button onclick="resetData()" class="text-xs font-semibold bg-red-50 hover:bg-red-100 text-red-500 border border-red-100 rounded-lg px-3 py-1.5 transition cursor-pointer">
                            전체 리셋
                        </button>
                    </div>
                </div>

                <!-- 필터 탭 -->
                <div class="flex gap-1.5 border-b border-slate-100 pb-3 mb-3 overflow-x-auto">
                    <button onclick="filterHistory('전체')" id="filter-전체" class="filter-btn text-xs font-medium px-3 py-1.5 rounded-lg bg-slate-900 text-white transition cursor-pointer">전체</button>
                    <button onclick="filterHistory('알바')" id="filter-알바" class="filter-btn text-xs font-medium px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition cursor-pointer">알바</button>
                    <button onclick="filterHistory('용돈 차감')" id="filter-용돈" class="filter-btn text-xs font-medium px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition cursor-pointer">용돈 차감</button>
                    <button onclick="filterHistory('특별 탕감')" id="filter-특별" class="filter-btn text-xs font-medium px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition cursor-pointer">특별 탕감</button>
                </div>

                <!-- 히스토리 스크롤 영역 -->
                <div id="historyList" class="space-y-3 max-h-96 overflow-y-auto pr-1">
                    <div class="text-center py-8 text-slate-400 text-sm">내역을 불러오는 중입니다...</div>
                </div>
            </div>

        </div>
    </div>

    <!-- 푸터 가이드 -->
    <div class="max-w-2xl w-full mx-auto px-4 mt-6 text-center text-xs text-slate-400">
        <p>© 부채 탕감 프로젝트 Dashboard · 오픈소스 라이선스</p>
    </div>

    <script>
        // =========================================================================
        // ⚠️ [필수 설정] 아들과 실시간 공유를 원하시면 아래 정보를 본인의 Firebase 정보로 교체하세요!
        // 만약 아래 정보를 그대로 두면 자동으로 안전한 '로컬 모드(브라우저 저장)'로 작동합니다.
        // =========================================================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const INITIAL_DEBT = 50000000;
        let balance = INITIAL_DEBT;
        let history = [];
        let currentFilter = '전체';
        let isFirebaseActive = false;
        let database = null;

        // Firebase 활성화 여부 검증
        if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") {
            try {
                firebase.initializeApp(firebaseConfig);
                database = firebase.database();
                isFirebaseActive = true;
                document.getElementById('storageBadge').innerText = "실시간 서버 모드";
                document.getElementById('storageBadge').className = "text-xs px-2.5 py-1 rounded-md font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
            } catch (e) {
                console.error("Firebase 초기화 실패, 로컬 모드로 전환합니다.", e);
            }
        }

        // 초기 데이터 로드 및 리스너 등록
        if (isFirebaseActive) {
            database.ref('debt_project').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    balance = data.balance !== undefined ? data.balance : INITIAL_DEBT;
                    history = data.history || [];
                } else {
                    balance = INITIAL_DEBT;
                    history = [];
                }
                updateUI();
            });
        } else {
            // 로컬 스토리지 모드 작동
            balance = localStorage.getItem('premium_debt_balance') ? parseInt(localStorage.getItem('premium_debt_balance')) : INITIAL_DEBT;
            history = localStorage.getItem('premium_debt_history') ? JSON.parse(localStorage.getItem('premium_debt_history')) : [];
            setTimeout(updateUI, 100); // UI 렌더링 지연 방지
        }

        // UI 대시보드 새로고침
        function updateUI() {
            // 잔액 및 총 상환금 계산
            const totalCleared = INITIAL_DEBT - balance;
            const progressPercent = INITIAL_DEBT > 0 ? ((totalCleared / INITIAL_DEBT) * 100).toFixed(1) : 100;

            document.getElementById('balanceDisplay').innerText = balance.toLocaleString() + '원';
            document.getElementById('totalClearedDisplay').innerText = '총 탕감액: ' + totalCleared.toLocaleString() + '원';
            document.getElementById('progressPercent').innerText = '상환율: ' + progressPercent + '%';
            document.getElementById('progressBar').style.width = progressPercent + '%';

            // 히스토리 필터링 및 렌더링
            renderHistoryList();
        }

        // 내역 리스트 렌더링
        function renderHistoryList() {
            const historyList = document.getElementById('historyList');
            
            const filteredHistory = history.filter(item => {
                if (currentFilter === '전체') return true;
                if (currentFilter === '용돈 차감') return item.category === '용돈 차감';
                return item.category === currentFilter;
            });

            if (filteredHistory.length === 0) {
                historyList.innerHTML = `
                    <div class="text-center py-12 border-2 border-dashed border-slate-100 rounded-2xl">
                        <p class="text-slate-400 text-sm font-medium">조건에 맞는 탕감 내역이 존재하지 않습니다.</p>
                    </div>`;
                return;
            }

            historyList.innerHTML = filteredHistory.map((log, index) => {
                let badgeStyle = "bg-slate-100 text-slate-700 border-slate-200";
                if (log.category === '알바') badgeStyle = "bg-indigo-50 text-indigo-600 border-indigo-100";
                if (log.category === '용돈 차감') badgeStyle = "bg-amber-50 text-amber-600 border-amber-100";
                if (log.category === '특별 탕감') badgeStyle = "bg-emerald-50 text-emerald-600 border-emerald-100";

                return `
                    <div class="bg-white border border-slate-100 rounded-xl p-4 flex justify-between items-center transition hover:shadow-md hover:border-slate-200/60 duration-200 group">
                        <div class="space-y-1">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold border px-2 py-0.5 rounded-md ${badgeStyle}">${log.category}</span>
                                <span class="text-[11px] text-slate-400 font-medium">${log.date}</span>
                            </div>
                            <p class="text-sm font-semibold text-slate-700 mt-1">${log.description || '상세 내역 없음'}</p>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <div>
                                <p class="text-base font-extrabold text-red-500">- ${log.amount.toLocaleString()}원</p>
                                <p class="text-[11px] font-medium text-slate-400">잔액: ${log.balance.toLocaleString()}원</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 필터 변경
        function filterHistory(category) {
            currentFilter = category;
            
            // 버튼 디자인 초기화
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "filter-btn text-xs font-medium px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 transition cursor-pointer";
            });

            // 선택된 버튼 디자인 활성화
            let targetId = 'filter-전체';
            if (category === '알바') targetId = 'filter-알바';
            if (category === '용돈 차감') targetId = 'filter-용돈';
            if (category === '특별 탕감') targetId = 'filter-특별';
            
            document.getElementById(targetId).className = "filter-btn text-xs font-medium px-3 py-1.5 rounded-lg bg-slate-900 text-white transition cursor-pointer";
            
            renderHistoryList();
        }

        // 탕감 등록 이벤트
        function addDeduction() {
            const category = document.getElementById('category').value;
            const amountInput = document.getElementById('amount');
            const descriptionInput = document.getElementById('description');
            
            const amount = parseInt(amountInput.value);
            const description = descriptionInput.value.trim();

            if (isNaN(amount) || amount <= 0) {
                alert('정확한 탕감 금액을 숫자로 입력해주세요.');
                return;
            }

            if (balance === 0) {
                alert('이미 잔액이 0원입니다. 탕감 프로젝트가 완료되었습니다! 🎉');
                return;
            }

            const actualDeduction = Math.min(amount, balance);
            const newBalance = balance - actualDeduction;
            const today = new Date().toISOString().split('T')[0];

            const record = {
                id: Date.now(),
                date: today,
                category: category,
                amount: actualDeduction,
                balance: newBalance,
                description: description
            };

            const updatedHistory = [record, ...history];

            if (isFirebaseActive) {
                database.ref('debt_project').set({
                    balance: newBalance,
                    history: updatedHistory
                }).then(() => {
                    clearInputs(amountInput, descriptionInput);
                    checkCompletion(newBalance);
                });
            } else {
                balance = newBalance;
                history = updatedHistory;
                localStorage.setItem('premium_debt_balance', balance);
                localStorage.setItem('premium_debt_history', JSON.stringify(history));
                clearInputs(amountInput, descriptionInput);
                updateUI();
                checkCompletion(newBalance);
            }
        }

        function clearInputs(amt, desc) {
            amt.value = '';
            desc.value = '';
        }

        function checkCompletion(bal) {
            if (bal === 0) {
                alert('🎊 대단합니다! 총 5,000만 원의 모든 약정 부채 탕감이 완료되었습니다! 고생하셨습니다. 🎊');
            }
        }

        // 데이터 리셋
        function resetData() {
            if (confirm('⚠️ 경고: 모든 탕감 기록과 잔액이 완전히 초기화되고 5천만 원으로 설정됩니다. 진행할까요?')) {
                if (isFirebaseActive) {
                    database.ref('debt_project').set({
                        balance: INITIAL_DEBT,
                        history: []
                    });
                } else {
                    localStorage.removeItem('premium_debt_balance');
                    localStorage.removeItem('premium_debt_history');
                    balance = INITIAL_DEBT;
                    history = [];
                    updateUI();
                }
            }
        }

        // CSV 파일 엑셀 내보내기 기능
        function exportToCSV() {
            if (history.length === 0) {
                alert('내보낼 데이터가 없습니다.');
                return;
            }

            let csvContent = "\uFEFF"; // UTF-8 BOM 설정 (엑셀 한글 깨짐 방지)
            csvContent += "날짜,분류,탕감금액,남은잔액,상세내용\n";

            history.forEach(log => {
                csvContent += `"${log.date}","${log.category}",${log.amount},${log.balance},"${log.description || ''}"\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `부채탕감내역_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
